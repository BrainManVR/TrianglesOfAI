<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangles of Impact - AI Ecosystem Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) translateX(0); }
            25% { transform: translate(-50%, -50%) translateX(-8px); }
            50% { transform: translate(-50%, -50%) translateX(8px); }
            75% { transform: translate(-50%, -50%) translateX(-8px); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
        .node-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bg-radial {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        .glow-line {
            filter: drop-shadow(0 0 6px currentColor);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden select-none">

    <!-- Header -->
    <header class="p-6 bg-slate-900 border-b border-slate-800 shadow-2xl z-20">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500">
                    TRIANGLES OF IMPACT
                </h1>
                <p class="text-slate-500 text-xs mt-1 uppercase tracking-widest font-bold">AI Industry Relationship Mapping</p>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleInstructions()" class="p-2 text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="info" class="w-5 h-5"></i>
                </button>
                <button onclick="resetGame()" class="p-2 text-orange-500 hover:text-orange-400 transition-colors">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Game Stage -->
    <main id="game-container" class="relative flex-1 bg-radial overflow-hidden">
        
        <!-- SVG Drawing Layer - Using viewBox for robust coordinate system -->
        <svg id="svg-layer" viewBox="0 0 100 100" preserveAspectRatio="none" class="absolute inset-0 w-full h-full pointer-events-none"></svg>

        <!-- Nodes Layer -->
        <div id="nodes-layer" class="absolute inset-0 w-full h-full pointer-events-none"></div>

        <!-- Start Instructions (Centered) -->
        <div id="instruction-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/40 backdrop-blur-sm">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] text-center max-w-sm w-[90%] pointer-events-auto">
                <h3 class="font-black text-cyan-400 text-xl mb-4 tracking-tight">IDENTIFY THE TRIANGLES</h3>
                <p class="text-sm text-slate-400 leading-relaxed mb-6">
                    Click 3 nodes to form an ecosystem triangle (CEO, Company, LLM). <br/><br/>
                    Correct sets will <span class="text-emerald-400 font-bold underline">LOCK</span> into the map permanently. <br/>
                    Incorrect sets will turn <span class="text-red-400 font-bold">RED</span> and reset.
                </p>
                <button onclick="hideInstructions()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-black rounded-xl transition-all uppercase tracking-widest text-xs">
                    Start Discovery
                </button>
            </div>
        </div>

        <!-- Win State Overlay -->
        <div id="win-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-xl hidden">
            <div class="text-center p-12 bg-slate-900 border border-slate-800 rounded-[3rem] shadow-2xl max-w-lg mx-4">
                <i data-lucide="trophy" class="mx-auto text-yellow-500 mb-6 w-20 h-20"></i>
                <h2 class="text-5xl font-black mb-4 tracking-tighter italic">SYNCHRONIZED</h2>
                <p class="text-slate-400 mb-8 text-lg">
                    The global AI ecosystem has been mapped.
                </p>
                <button onclick="resetGame()" class="px-10 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-full transition-all hover:scale-105 active:scale-95 uppercase tracking-widest text-sm">
                    Reset Workshop
                </button>
            </div>
        </div>
    </main>

    <!-- Legend Footer -->
    <footer id="legend-footer" class="p-4 bg-slate-900 border-t border-slate-800 flex flex-wrap justify-center gap-6 sm:gap-10"></footer>

    <script>
        const triangleData = [
            { id: 1, color: '#EAB308', members: ['Mark Zuckerberg', 'Meta', 'Llama 4'], label: 'Meta Ecosystem' },
            { id: 2, color: '#A855F7', members: ['Sundar Pichai', 'Google', 'Gemini 3.1'], label: 'Google Ecosystem' },
            { id: 3, color: '#06B6D4', members: ['Satya Nadella', 'Microsoft', 'Copilot'], label: 'Microsoft Ecosystem' },
            { id: 4, color: '#10B981', members: ['Sam Altman', 'OpenAI', 'ChatGPT-5.5'], label: 'OpenAI Ecosystem' },
        ];

        let nodes = [];
        let selectedIds = [];
        let completedTriangleIds = [];
        let feedback = null;

        function initGame() {
            const allNames = triangleData.flatMap(t => t.members);
            const shuffledNames = [...allNames].sort(() => Math.random() - 0.5);
            
            const radius = 35; 
            const centerX = 50;
            const centerY = 50;

            nodes = shuffledNames.map((name, index) => {
                const angle = (index / allNames.length) * 2 * Math.PI - Math.PI / 2;
                return {
                    id: index,
                    name,
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle),
                    triangleId: triangleData.find(t => t.members.includes(name)).id
                };
            });

            renderLegend();
            render();
            lucide.createIcons();
        }

        function renderLegend() {
            const footer = document.getElementById('legend-footer');
            footer.innerHTML = triangleData.map(t => `
                <div id="legend-${t.id}" class="flex items-center gap-2 transition-all duration-500 opacity-20">
                    <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${t.color}"></div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-300">${t.label}</span>
                </div>
            `).join('');
        }

        function handleNodeClick(id) {
            if (feedback === 'incorrect') return;
            const node = nodes.find(n => n.id === id);
            if (completedTriangleIds.includes(node.triangleId)) return;

            if (selectedIds.includes(id)) {
                selectedIds = selectedIds.filter(sid => sid !== id);
            } else if (selectedIds.length < 3) {
                selectedIds.push(id);
                if (selectedIds.length === 3) {
                    validateSelection();
                }
            }
            render();
        }

        function validateSelection() {
            const selectedNodes = nodes.filter(n => selectedIds.includes(n.id));
            const firstTriangleId = selectedNodes[0].triangleId;
            const isCorrect = selectedNodes.every(n => n.triangleId === firstTriangleId);

            if (isCorrect) {
                feedback = 'correct';
                render();
                setTimeout(() => {
                    completedTriangleIds.push(firstTriangleId);
                    selectedIds = [];
                    feedback = null;
                    if (completedTriangleIds.length === triangleData.length) {
                        document.getElementById('win-overlay').classList.remove('hidden');
                    }
                    render();
                }, 800);
            } else {
                feedback = 'incorrect';
                render();
                setTimeout(() => {
                    selectedIds = [];
                    feedback = null;
                    render();
                }, 1000);
            }
        }

        function render() {
            const nodesContainer = document.getElementById('nodes-layer');
            const svgLayer = document.getElementById('svg-layer');
            
            // Render Nodes
            nodesContainer.innerHTML = nodes.map(node => {
                const isSelected = selectedIds.includes(node.id);
                const isSolved = completedTriangleIds.includes(node.triangleId);
                const tData = triangleData.find(t => t.id === node.triangleId);
                
                let borderColor = 'rgba(51, 65, 85, 0.5)';
                let textColor = '#94a3b8';
                let bgColor = 'rgba(15, 23, 42, 0.8)';
                let extraClass = '';

                if (isSolved) {
                    borderColor = tData.color;
                    textColor = tData.color;
                    bgColor = 'rgba(15, 23, 42, 0.9)';
                } else if (isSelected) {
                    if (feedback === 'incorrect') {
                        borderColor = '#ef4444';
                        textColor = '#ef4444';
                        extraClass = 'animate-shake';
                    } else if (feedback === 'correct') {
                        borderColor = '#22c55e';
                        textColor = '#22c55e';
                    } else {
                        borderColor = '#22d3ee';
                        textColor = '#fff';
                        bgColor = '#1e293b';
                    }
                }

                return `
                    <div 
                        onclick="handleNodeClick(${node.id})"
                        class="absolute transform -translate-x-1/2 -translate-y-1/2 cursor-pointer node-transition px-5 py-3 rounded-full border-2 text-center shadow-lg pointer-events-auto ${extraClass} ${isSelected ? 'z-30 scale-110' : isSolved ? 'z-10' : 'z-0'}"
                        style="left: ${node.x}%; top: ${node.y}%; border-color: ${borderColor}; color: ${textColor}; background-color: ${bgColor}; box-shadow: ${isSolved ? '0 0 20px ' + borderColor + '66' : isSelected ? '0 0 15px ' + borderColor + '44' : 'none'}"
                    >
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-black tracking-tight whitespace-nowrap">${node.name}</span>
                            ${isSolved ? '<i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>' : ''}
                            ${isSelected && feedback === 'incorrect' ? '<i data-lucide="x-circle" class="w-3.5 h-3.5"></i>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Render SVG Lines and Fills
            let svgContent = '';

            // Persistent Solved Triangles - NO PERCENTAGE SYMBOLS
            completedTriangleIds.forEach(tId => {
                const tNodes = nodes.filter(n => n.triangleId === tId);
                const tData = triangleData.find(t => t.id === tId);
                const points = tNodes.map(n => `${n.x},${n.y}`).join(' ');
                svgContent += `
                    <g class="glow-line" style="color: ${tData.color}; transition: opacity 0.7s ease-in-out;">
                        <polygon points="${points}" fill="${tData.color}" class="opacity-20"></polygon>
                        <polygon points="${points}" stroke="${tData.color}" stroke-width="0.8" fill="none" stroke-linejoin="round" class="opacity-100"></polygon>
                    </g>
                `;
                // Update legend opacity
                const legendEl = document.getElementById(`legend-${tId}`);
                if (legendEl) {
                    legendEl.classList.remove('opacity-20');
                    legendEl.classList.add('opacity-100', 'scale-110');
                }
            });

            // Active Selection Layer
            if (selectedIds.length > 0) {
                const color = feedback === 'incorrect' ? '#ef4444' : feedback === 'correct' ? '#22c55e' : '#22d3ee';
                const strokeWidth = feedback ? "0.8" : "0.4";
                const dash = feedback ? "none" : "1,1";

                // Draw Lines for current selection
                selectedIds.forEach((id, index) => {
                    const isFinal = selectedIds.length === 3 && index === 2;
                    const nextId = isFinal ? selectedIds[0] : selectedIds[index + 1];
                    
                    if (nextId !== undefined) {
                        const n1 = nodes.find(n => n.id === id);
                        const n2 = nodes.find(n => n.id === nextId);
                        svgContent += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" stroke="${color}" stroke-width="${strokeWidth}" stroke-dasharray="${dash}" stroke-linecap="round" />`;
                    }
                });

                // Draw Fill for selection
                if (selectedIds.length === 3) {
                    const points = selectedIds.map(id => {
                        const n = nodes.find(node => node.id === id);
                        return `${n.x},${n.y}`;
                    }).join(' ');
                    const fill = feedback === 'incorrect' ? '#ef4444' : feedback === 'correct' ? '#22c55e' : 'rgba(34, 211, 238, 0.1)';
                    svgContent += `<polygon points="${points}" fill="${fill}" class="opacity-20" />`;
                }
            }

            svgLayer.innerHTML = svgContent;
            lucide.createIcons();
        }

        function resetGame() {
            completedTriangleIds = [];
            selectedIds = [];
            feedback = null;
            document.getElementById('win-overlay').classList.add('hidden');
            initGame();
        }

        function toggleInstructions() {
            const el = document.getElementById('instruction-overlay');
            el.classList.toggle('hidden');
        }

        function hideInstructions() {
            document.getElementById('instruction-overlay').classList.add('hidden');
        }

        window.onload = initGame;
    </script>
</body>
</html>
